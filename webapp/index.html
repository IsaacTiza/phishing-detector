<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .logo {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: #888;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .url-input {
      flex: 1;
      padding: 14px 16px;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .url-input:focus {
      border-color: #4a9eff;
    }

    .url-input::placeholder {
      color: #555;
    }

    .scan-btn {
      padding: 14px 24px;
      background: #1e3a5f;
      color: #4a9eff;
      border: 1px solid #2a5a8f;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .scan-btn:hover {
      background: #254a7a;
    }

    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Result card */
    .result-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 14px;
      padding: 28px;
      display: none;
    }

    .result-card.visible {
      display: block;
    }

    /* Scanning state */
    .scanning {
      text-align: center;
      padding: 20px 0;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #2a2d3a;
      border-top: 4px solid #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .scanning p {
      color: #888;
      font-size: 14px;
    }

    /* Verdict */
    .verdict-section {
      text-align: center;
      margin-bottom: 24px;
    }

    .verdict-icon {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .verdict-label {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .verdict-label.legitimate {
      color: #4caf50;
    }

    .verdict-label.phishing {
      color: #f44336;
    }

    .verdict-confidence {
      font-size: 13px;
      color: #888;
    }

    /* Scanned URL */
    .scanned-url {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #aaa;
      word-break: break-all;
      margin-bottom: 20px;
      text-align: left;
    }

    /* Probability bars */
    .probability-section {
      margin-bottom: 20px;
    }

    .probability-section h3 {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .bar-label {
      width: 80px;
      color: #aaa;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      background: #2a2d3a;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.8s ease;
    }

    .bar-fill.green { background: #4caf50; }
    .bar-fill.red   { background: #f44336; }

    .bar-pct {
      width: 40px;
      color: #aaa;
      font-size: 12px;
    }

    /* Feature grid */
    .features-section h3 {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .feature-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1117;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
    }

    .feature-name {
      color: #888;
      text-transform: capitalize;
    }

    .feature-value {
      font-weight: 600;
      font-size: 11px;
    }

    .feature-value.legit  { color: #4caf50; }
    .feature-value.suspicious { color: #ff9800; }
    .feature-value.phish  { color: #f44336; }

    /* Error */
    .error-section {
      text-align: center;
      padding: 20px 0;
    }

    .error-section .error-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .error-section p {
      color: #f44336;
      font-size: 14px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #444;
    }

    .footer a {
      color: #4a9eff;
      text-decoration: none;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .input-area {
        flex-direction: column;
      }

      .scan-btn {
        width: 100%;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">🛡️</div>
      <h1>Phishing Detector</h1>
      <p>Powered by Random Forest AI — Enter any URL to check if it's safe</p>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input
        type="text"
        class="url-input"
        id="url-input"
        placeholder="https://example.com"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
      />
      <button class="scan-btn" id="scan-btn" onclick="scanURL()">
        🔍 Scan
      </button>
    </div>

    <!-- Result card -->
    <div class="result-card" id="result-card">

      <!-- Scanning -->
      <div class="scanning" id="scanning-state">
        <div class="spinner"></div>
        <p>Analyzing website... This may take up to 30 seconds.</p>
      </div>

      <!-- Verdict -->
      <div id="verdict-state" style="display:none;">
        <div class="verdict-section">
          <div class="verdict-icon" id="verdict-icon"></div>
          <div class="verdict-label" id="verdict-label"></div>
          <div class="verdict-confidence" id="verdict-confidence"></div>
        </div>

        <div class="scanned-url" id="scanned-url"></div>

        <div class="probability-section">
          <h3>Probability Breakdown</h3>
          <div class="bar-row">
            <span class="bar-label">Legitimate</span>
            <div class="bar-track">
              <div class="bar-fill green" id="legit-bar"></div>
            </div>
            <span class="bar-pct" id="legit-pct">0%</span>
          </div>
          <div class="bar-row">
            <span class="bar-label">Phishing</span>
            <div class="bar-track">
              <div class="bar-fill red" id="phish-bar"></div>
            </div>
            <span class="bar-pct" id="phish-pct">0%</span>
          </div>
        </div>

        <div class="features-section">
          <h3>Feature Analysis</h3>
          <div class="feature-grid" id="feature-grid"></div>
        </div>
      </div>

      <!-- Error -->
      <div class="error-section" id="error-state" style="display:none;">
        <div class="error-icon">⚠️</div>
        <p id="error-message"></p>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Built with Random Forest ML · 97.42% accuracy on 11,055 samples</p>
      <p style="margin-top:6px;">
        <a href="https://github.com/IsaacTiza/phishing-detector" target="_blank">
          View on GitHub
        </a>
      </p>
    </div>

  </div>

  <script>
    const API_URL = "https://phishing-detector-npfz.onrender.com/check-url";

    // Allow Enter key to trigger scan
    document.getElementById("url-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") scanURL();
    });

    function showScanning() {
      document.getElementById("result-card").classList.add("visible");
      document.getElementById("scanning-state").style.display = "block";
      document.getElementById("verdict-state").style.display = "none";
      document.getElementById("error-state").style.display = "none";
    }

    function showVerdict(data) {
      document.getElementById("scanning-state").style.display = "none";
      document.getElementById("error-state").style.display = "none";
      document.getElementById("verdict-state").style.display = "block";

      const isLegit = data.verdict === "LEGITIMATE";

      document.getElementById("verdict-icon").textContent = isLegit ? "✅" : "🚨";
      document.getElementById("verdict-label").textContent = isLegit ? "Legitimate" : "Phishing / Malicious";
      document.getElementById("verdict-label").className = "verdict-label " + (isLegit ? "legitimate" : "phishing");
      document.getElementById("verdict-confidence").textContent = `Confidence: ${data.confidence}%`;
      document.getElementById("scanned-url").textContent = data.url;

      setTimeout(() => {
        document.getElementById("legit-bar").style.width = `${data.legitimate_probability}%`;
        document.getElementById("phish-bar").style.width = `${data.phishing_probability}%`;
        document.getElementById("legit-pct").textContent = `${data.legitimate_probability}%`;
        document.getElementById("phish-pct").textContent = `${data.phishing_probability}%`;
      }, 100);

      // Render features
      const grid = document.getElementById("feature-grid");
      grid.innerHTML = "";
      for (const [key, value] of Object.entries(data.features)) {
        const label = value === 1 ? "Legit" : value === 0 ? "Suspicious" : "Phishing";
        const cls = value === 1 ? "legit" : value === 0 ? "suspicious" : "phish";
        const name = key.replace(/_/g, " ");
        grid.innerHTML += `
          <div class="feature-item">
            <span class="feature-name">${name}</span>
            <span class="feature-value ${cls}">${label}</span>
          </div>`;
      }
    }

    function showError(message) {
      document.getElementById("scanning-state").style.display = "none";
      document.getElementById("verdict-state").style.display = "none";
      document.getElementById("error-state").style.display = "block";
      document.getElementById("error-message").textContent = message;
    }

    async function scanURL() {
      let url = document.getElementById("url-input").value.trim();
      if (!url) return;

      if (!url.startsWith("http")) url = "https://" + url;

      const btn = document.getElementById("scan-btn");
      btn.disabled = true;
      btn.textContent = "Scanning...";

      showScanning();

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 60000);

        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
          signal: controller.signal
        });

        clearTimeout(timeout);

        if (!response.ok) throw new Error(`Server error: ${response.status}`);

        const data = await response.json();

        if (data.verdict === "ERROR") {
          showError("Analysis failed: " + data.error);
        } else {
          showVerdict(data);
        }

      } catch (err) {
        if (err.name === "AbortError") {
          showError("Request timed out. The site took too long to respond.");
        } else {
          showError("Cannot reach backend. Try again in a moment.");
        }
      }

      btn.disabled = false;
      btn.textContent = "🔍 Scan";
    }
  </script>

</body>
</html>
